noise_scp: null
noise_apply_prob: 1.0
noise_db_range: '13_15'
short_noise_thres: 0.5
aux_ctc_tasks: []
frontend: default
frontend_conf:
    n_fft: 512
    hop_length: 160
    fs: 16k
specaug: null
specaug_conf: {}
normalize: utterance_mvn
normalize_conf: {}
model: espnet
model_conf:
    ctc_weight: 0.0
    lsm_weight: 0.1
preencoder: null
preencoder_conf: {}
encoder: rnn
encoder_conf:
    rnn_type: lstm
    bidirectional: false
    num_layers: 3
    hidden_size: 256
postencoder: null
postencoder_conf: {}
decoder: s4
decoder_conf:
    dropout: 0.1
    prenorm: true
    n_layers: 2
    layer:
    -   postact: glu
        dropout: 0.1
        n_ssm: 1
        dt_min: 0.001
        dt_max: 0.1
        measure: legs
        transposed: false
        _name_: s4
    -   expand: 4
        activation: gelu
        dropout: 0.1
        transposed: false
        _name_: ff
    residual: residual
    norm: layer
preprocessor: default
preprocessor_conf: {}
required:
- output_dir
- token_list
version: '202511'
distributed: false
