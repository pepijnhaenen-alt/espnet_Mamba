# Streaming Mamba2 + RNN-T training recipe
# Goal: reduce decoding latency vs attention decoder with minimal WER degradation.

frontend: default
frontend_conf:
  n_fft: 512
  win_length: 512
  hop_length: 128
  window: hann
  n_mels: 80
  fmin: 80
  fmax: 7600

specaug: specaug
specaug_conf:
  apply_time_warp: false
  time_mask_width_range: [0, 40]
  freq_mask_width_range: [0, 20]
  num_time_mask: 2
  num_freq_mask: 2

normalize: utterance_mvn
normalize_conf: {}

encoder: mamba
encoder_conf:
  mamba_type: mamba2
  output_size: 256
  hidden_size: 512
  num_blocks: 16
  d_state: 16
  expand: 2
  conv_kernel_size: 15
  conv_num_layers: 2
  linear_units: 2048
  dropout_rate: 0.15
  chunk_size: 20

decoder: transducer
decoder_conf:
  rnn_type: lstm
  num_layers: 1
  hidden_size: 512
  dropout: 0.10
  dropout_embed: 0.10

joint_net_conf:
  joint_space_size: 640
  joint_activation_type: tanh

ctc_conf:
  dropout_rate: 0.10

model_conf:
  ctc_weight: 0.30
  interctc_weight: 0.0
  lsm_weight: 0.0
  length_normalized_loss: false
  report_cer: false
  report_wer: false

optim: adamw
optim_conf:
  lr: 0.00025
  weight_decay: 0.0001
  betas: [0.9, 0.98]
  eps: 1.0e-8

scheduler: warmuplr
scheduler_conf:
  warmup_steps: 40000

max_epoch: 40
resume: false
batch_type: numel
batch_bins: 1400000
accum_grad: 2
grad_clip: 1.0
num_workers: 6
patience: 10
num_att_plot: 0
