# asr_config.yaml (correct recipe layout)

# Encoder configuration
encoder: rnn
encoder_conf:
  rnn_type: lstm
  bidirectional: false
  num_layers: 3
  hidden_size: 256

# S4 decoder configuration
decoder: s4
decoder_conf:
  dropout: 0.1
  prenorm: true
  n_layers: 2
  layer:
    - _name_: mamba2
      d_conv: 4
      expand: 2
      headdim: 64
      ngroups: 1
      A_init_range: [1, 16]
      D_has_hdim: false
      rmsnorm: true
      norm_before_gate: false
      dt_min: 0.001
      dt_max: 0.1
      dt_init_floor: 0.0001
      bias: false
      conv_bias: true
      chunk_size: 256
      use_mem_eff_path: true
      dropout: 0.1
    - _name_: ff
      expand: 4
      activation: gelu
      dropout: 0.1
  residual: residual
  norm: layer

# Model-specific settings
model_conf:
  ctc_weight: 0.0
  lsm_weight: 0.1

# Training configuration
init: xavier_uniform
max_epoch: 50
batch_type: folded
batch_size: 32
optim: adam
optim_conf:
  lr: 0.001

# Data paths (placeholders for recipe)
# These are typically set by the recipe stage scripts and not required in every config,
# but you can use them for standalone testing.
# train_data_path_and_name_and_type: "path/to/train/wav.scp,path/to/train/text,text"
# valid_data_path_and_name_and_type: "path/to/valid/wav.scp,path/to/valid/text,text"
# test_data_path_and_name_and_type: "path/to/test/wav.scp,path/to/test/text,text"

# Optional runtime settings
frontend: default
frontend_conf:
  n_fft: 512
  hop_length: 160

normalize: utterance_mvn