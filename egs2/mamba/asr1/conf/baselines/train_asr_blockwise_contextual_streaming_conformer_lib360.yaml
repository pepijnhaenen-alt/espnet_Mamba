# Streaming Conformer (Contextual Block Processing) for LibriSpeech train-clean-360.
# Architecture follows Tsunoo et al. "Streaming Transformer ASR with blockwise
# synchronous beam search" (https://arxiv.org/abs/2006.14941).
#
# Hyperparameters aligned with our chunk-trained RoPE model:
#   train_asr_conformer_chunk_rope_causalxattn_rightctx_finetune_xattn_noright_ROPEFIX_fromInit.yaml
# so the two recipes are directly comparable on lib360.
#
# Parameters that COULD NOT be transferred (fundamentally incompatible with
# contextual_block_conformer — verified against the encoder source):
#   * pos_enc_layer_type: rope / use_rope: true
#       contextual_block_conformer hardcodes pos_enc_class=StreamPositionalEncoding
#       and uses plain MultiHeadedAttention. The blockwise mechanism depends on
#       a learned positional encoding applied to the context vectors; RoPE has
#       no context-token concept. selfattention_layer_type is in the signature
#       but ignored.
#   * use_flash_attn / use_kvcache
#       Not in the encoder __init__ signature.
#   * dynamic_chunk_training / use_chunked_cross_attn / use_alignment_loss
#       Those are the streaming mechanism for vanilla `conformer`. The
#       contextual-block encoder IS the streaming mechanism (block_size /
#       hop_size / look_ahead), so stacking both is meaningless.
# Everything else (encoder dims, decoder, frontend, optim, specaug) matches the
# reference config verbatim.

# frontend related
frontend: default
frontend_conf:
    n_fft: 512
    win_length: 512  # 32ms window
    hop_length: 128  # 8ms stride
    center: false

# encoder related
encoder: contextual_block_conformer
encoder_conf:
    input_layer: conv2d6        # subsample=6 (equivalent to conv2d6_wo_posenc in vanilla conformer; the contextual-block flavor is already WOPosEnc internally)
    output_size: 256
    attention_heads: 4
    linear_units: 2048
    num_blocks: 12
    dropout_rate: 0.1
    positional_dropout_rate: 0.1
    attention_dropout_rate: 0.0
    normalize_before: true
    activation_type: swish
    macaron_style: true
    use_cnn_module: true
    cnn_module_kernel: 15
    block_size: 40              # streaming configuration
    hop_size: 16                # streaming configuration
    look_ahead: 16              # streaming configuration
    init_average: true          # streaming configuration
    ctx_pos_enc: true           # streaming configuration

# decoder related
decoder: transformer
decoder_conf:
    input_layer: embed
    num_blocks: 6
    linear_units: 2048
    dropout_rate: 0.1

# hybrid CTC/attention
model_conf:
    ctc_weight: 0.3
    lsm_weight: 0.1
    length_normalized_loss: false

# optimization related
optim: adam
batch_size: 32
accum_grad: 2
grad_clip: 3
max_epoch: 40
patience: 5
optim_conf:
    lr: 0.4
scheduler: noamlr
scheduler_conf:
    model_size: 256
    warmup_steps: 25000

best_model_criterion:
-   - valid
    - acc
    - max
keep_nbest_models: 10

# Data loading / mixed precision (matches ROPEFIX_fromInit speedup knobs)
num_workers: 2
use_amp: true

specaug: specaug
specaug_conf:
    apply_time_warp: true
    time_warp_window: 5
    time_warp_mode: bicubic
    apply_freq_mask: true
    freq_mask_width_range:
    - 0
    - 30
    num_freq_mask: 2
    apply_time_mask: true
    time_mask_width_range:
    - 0
    - 40
    num_time_mask: 2
